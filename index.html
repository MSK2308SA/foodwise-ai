<!DOCTYPE html>
<html>
<head>
  <title>FoodWise AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0a0f0d;
      color: white;
      padding: 20px;
    }
    .card {
      background: #161e1a;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      background: #4ade80;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>🌿 FoodWise AI</h2>

<div class="card">
  <h3>🍽️ Food Waste Prediction</h3>

  <input id="food" placeholder="Food (kg)">
  <input id="people" placeholder="Number of People">

  <button onclick="calculate()">Predict Waste</button>

  <h2 id="result"></h2>
</div>

<div class="card">
  <h3>🧬 Nutrition Analyzer</h3>

  <input id="foodname" placeholder="Enter food name">
  <button onclick="nutrition()">Analyze</button>

  <p id="nutri"></p>
</div>

<div class="card">
  <h3>🥗 Diet Plan</h3>

  <p>Monday: Oats + Fruits</p>
  <p>Tuesday: Rice + Dal</p>
  <p>Wednesday: Chapati + Vegetables</p>
  <p>Thursday: Salad + Soup</p>
  <p>Friday: Brown Rice + Chicken</p>
  <p>Saturday: Fruits + Nuts</p>
  <p>Sunday: Cheat Day 🍕</p>
</div>

<script>
function calculate() {
  let food = parseFloat(document.getElementById("food").value);
  let people = parseInt(document.getElementById("people").value);

  if (!food || !people) return;

  let ratio = food / people;

  let waste = Math.max(
    0,
    0.08 * food + 0.002 * people + (ratio > 0.3 ? 0.15 * (ratio - 0.3) : 0)
  );

  document.getElementById("result").innerText = "Waste: " + waste.toFixed(2) + " kg";
}

function nutrition() {
  document.getElementById("nutri").innerText =
    "Calories: 420 | Protein: 18g | Fat: 10g | Digestion: 3-5 hrs";
}
</script>

</body>
</html>
